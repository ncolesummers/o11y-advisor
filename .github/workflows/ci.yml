name: CI (Elixir)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"
      - uses: actions/cache@v4
        with:
          path: |
            backend/deps
            backend/_build
          key: elixir-${{ hashFiles('backend/mix.lock') }}
      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix credo --strict

  test:
    name: Test + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: o11y_advisor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"
      - uses: actions/cache@v4
        with:
          path: |
            backend/deps
            backend/_build
          key: elixir-${{ hashFiles('backend/mix.lock') }}
      - run: mix deps.get
      - run: mix ecto.create
      - run: mix ecto.migrate
      - run: mix coveralls.github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/o11y_advisor_test

  evals-hard-fail:
    name: Evals (hard-fail)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: o11y_advisor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"
      - uses: actions/cache@v4
        with:
          path: |
            backend/deps
            backend/_build
          key: elixir-${{ hashFiles('backend/mix.lock') }}
      - run: mix deps.get
      - run: mix ecto.create
      - run: mix ecto.migrate
      - run: mix test --only hard_fail
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/o11y_advisor_test

  evals-threshold:
    name: Evals (threshold)
    # Only runs on PRs to main and the nightly schedule, not on every push
    if: github.event_name == 'schedule' || (github.event_name == 'pull_request' && github.base_ref == 'main')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: o11y_advisor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"
      - uses: actions/cache@v4
        with:
          path: |
            backend/deps
            backend/_build
          key: elixir-${{ hashFiles('backend/mix.lock') }}
      - run: mix deps.get
      - run: mix ecto.create
      - run: mix ecto.migrate
      - run: mix eval.run
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/o11y_advisor_test

